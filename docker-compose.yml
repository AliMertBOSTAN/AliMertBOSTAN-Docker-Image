services:  hardhat:    build:      context: ./contracts      dockerfile: Dockerfile    container_name: gcl-hardhat    command: npx hardhat node --hostname 0.0.0.0    ports:      - "${HARDHAT_PORT:-8545}:8545"    healthcheck:      test: >        node -e "          fetch('http://localhost:8545', {            method: 'POST',            headers: { 'Content-Type': 'application/json' },            body: JSON.stringify({ jsonrpc: '2.0', method: 'eth_blockNumber', params: [], id: 1 })          })          .then(r => r.json())          .then(d => process.exit(d.result ? 0 : 1))          .catch(() => process.exit(1))        "      interval: 3s      timeout: 10s      retries: 15      start_period: 10s    networks:      - gcl-network    restart: unless-stopped  deployer:    build:      context: ./contracts      dockerfile: Dockerfile    container_name: gcl-deployer    depends_on:      hardhat:        condition: service_healthy    command: npx hardhat run scripts/deploy-docker.js    environment:      - RPC_URL=http://hardhat:8545      - DEPLOY_OUTPUT_DIR=/deploy-output    volumes:      - deploy-data:/deploy-output    networks:      - gcl-network  backend:    build:      context: ./backend      dockerfile: Dockerfile    container_name: gcl-backend    depends_on:      deployer:        condition: service_completed_successfully    ports:      - "${BACKEND_PORT:-3000}:3000"    environment:      - PORT=3000      - JWT_SECRET=${JWT_SECRET:-mert-token-exchange-super-secret-key-docker-2024}      - RPC_URL=http://hardhat:8545      - PRICE_DECIMALS=8      - TOKEN_DECIMALS=18    volumes:      - deploy-data:/app/deploy-output:ro      - backend-data:/app/db-data        networks:      - gcl-network    restart: unless-stopped  frontend:    build:      context: ./frontend      dockerfile: Dockerfile      args:        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}        VITE_WC_PROJECT_ID: ${VITE_WC_PROJECT_ID:-demo-project-id}    container_name: gcl-frontend    depends_on:      - backend    ports:      - "${FRONTEND_PORT:-80}:80"    networks:      - gcl-network    restart: unless-stoppedvolumes:  deploy-data:    driver: local  backend-data:    driver: localnetworks:  gcl-network:    driver: bridge    name: gcl-network